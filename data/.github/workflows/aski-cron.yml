name: ASKI Doluluk Verisi

on:
  schedule:
    # Her 8 saatte bir: 00:00, 08:00, 16:00 (UTC)
    - cron: '0 */8 * * *'
  workflow_dispatch:  # Manuel tetikleme için

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python aski_doluluk.py

      - name: Commit & push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ASKI doluluk verisi güncellendi - ${{ github.run_id }}"
          file_pattern: "data/aski_doluluk.json"
