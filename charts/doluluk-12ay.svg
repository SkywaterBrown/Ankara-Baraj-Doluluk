  <line x1="60" y1="264.0" x2="760" y2="264.0" stroke="#333" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="50" y="264.0" text-anchor="end" dominant-baseline="middle" font-size="10" fill="#888">20%</text>
  <line x1="60" y1="208.0" x2="760" y2="208.0" stroke="#333" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="50" y="208.0" text-anchor="end" dominant-baseline="middle" font-size="10" fill="#888">40%</text>
  <line x1="60" y1="152.0" x2="760" y2="152.0" stroke="#333" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="50" y="152.0" text-anchor="end" dominant-baseline="middle" font-size="10" fill="#888">60%</text>
  <line x1="60" y1="96.0" x2="760" y2="96.0" stroke="#333" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
