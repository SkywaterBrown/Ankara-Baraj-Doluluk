  <line x1="60" y1="40.0" x2="760" y2="40.0" stroke="#333" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="50" y="40.0" text-anchor="end" dominant-baseline="middle" font-size="10" fill="#888">100%</text>

  <!-- Referans çizgileri -->
  <line x1="60" y1="236.0" x2="760" y2="236.0" stroke="#ef4444" stroke-width="1" stroke-dasharray="2,2" opacity="0.7"/>
  <text x="745" y="236.0" dominant-baseline="middle" font-size="9" fill="#ef4444">Kritik (30%)</text>
  <line x1="60" y1="180.0" x2="760" y2="180.0" stroke="#eab308" stroke-width="1" stroke-dasharray="2,2" opacity="0.7"/>
  <text x="745" y="180.0" dominant-baseline="middle" font-size="9" fill="#eab308">Normal (50%)</text>

  <!-- Toplam doluluk -->
  <polyline points="60.0,189.2 415.7,183.2 760.0,188.1" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="60.0,189.2 415.7,183.2 760.0,188.1" fill="none" stroke="#22c55e" stroke-width="5" opacity="0.1" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Aktif doluluk -->
  <polyline points="60.0,206.6 415.7,199.8 760.0,205.4" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="60.0,206.6 415.7,199.8 760.0,205.4" fill="none" stroke="#3b82f6" stroke-width="5" opacity="0.1" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Noktalar -->
  <circle cx="60.0" cy="189.2" r="3" fill="#22c55e"/><circle cx="415.7" cy="183.2" r="3" fill="#22c55e"/>
  <circle cx="60.0" cy="206.6" r="3" fill="#3b82f6"/><circle cx="415.7" cy="199.8" r="3" fill="#3b82f6"/>

  <!-- X ekseni -->
  <text x="60.0" y="380" text-anchor="middle" font-size="10" fill="#888">05.2026</text>
  <text x="415.7" y="380" text-anchor="middle" font-size="10" fill="#888">06.2026</text>
  <text x="760.0" y="380" text-anchor="middle" font-size="10" fill="#888">07.2026</text>

  <!-- Legend -->
  <g transform="translate(60, 345)">
    <rect x="0" y="0" width="12" height="12" fill="#22c55e" rx="2"/>
