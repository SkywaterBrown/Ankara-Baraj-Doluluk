name: ASKI Doluluk Verisi

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python aski_doluluk.py

      - name: Generate badges & charts
        run: |
          set -x
          python badge_generator.py
          python generate_charts.py
          echo "--- badges ---"
          ls -la badges/ || echo "badges/ klasoru yok"
          echo "--- charts ---"
          ls -la charts/ || echo "charts/ klasoru yok"
          echo "--- README basi ---"
          head -n 10 README.md

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/aski_doluluk.json badges/ charts/ README.md
          if git diff --staged --quiet; then
            echo "[INFO] Degisiklik yok, commit atlaniyor"
          else
            git commit -m "ASKI doluluk verisi, badge'ler ve grafik guncellendi [bot]"
            git push
            echo "[OK] Commit ve push tamamlandi"
          fi
